name: Bug report
description: Something is broken
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster we can fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How do we trigger this?
      placeholder: |
        1. Go to...
        2. Click...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose (OSS)
        - Local dev (pnpm dev)
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
